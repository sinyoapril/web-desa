<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Bagan Struktur Organisasi Desa Sukamaju</title>
  <desc id="desc">Bagan sementara struktur organisasi Pemerintah Desa Sukamaju.</desc>
  <rect width="1200" height="720" fill="#eaf6ee"/>
  <rect x="34" y="34" width="1132" height="652" rx="32" fill="#ffffff" stroke="#c8ead2" stroke-width="3"/>
  <text x="600" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="700" fill="#1a3a2a">Struktur Organisasi Desa Sukamaju</text>
  <text x="600" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4a6555">Pemerintah Desa Sukamaju - Kecamatan Ciawi</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1a3a2a" flood-opacity="0.12"/>
    </filter>
    <style>
      .box { fill: #ffffff; stroke: #8dd4a0; stroke-width: 2; filter: url(#shadow); }
      .box-main { fill: #1a3a2a; stroke: #e8c97a; stroke-width: 3; filter: url(#shadow); }
      .box-sub { fill: #f8fbf5; stroke: #52a96e; stroke-width: 2; filter: url(#shadow); }
      .title { font: 700 18px Arial, sans-serif; fill: #1a3a2a; }
      .name { font: 600 15px Arial, sans-serif; fill: #4a6555; }
      .main-title { font: 700 19px Arial, sans-serif; fill: #ffffff; }
      .main-name { font: 600 16px Arial, sans-serif; fill: #e8c97a; }
      .line { stroke: #52a96e; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
  </defs>

  <rect class="box-main" x="460" y="165" width="280" height="88" rx="18"/>
  <text class="main-title" x="600" y="204" text-anchor="middle">Kepala Desa</text>
  <text class="main-name" x="600" y="229" text-anchor="middle">H. Ahmad Fauzi, S.Pd</text>

  <rect class="box-sub" x="140" y="300" width="250" height="78" rx="16"/>
  <text class="title" x="265" y="331" text-anchor="middle">BPD</text>
  <text class="name" x="265" y="355" text-anchor="middle">Badan Permusyawaratan Desa</text>

  <rect class="box-sub" x="475" y="300" width="250" height="78" rx="16"/>
  <text class="title" x="600" y="331" text-anchor="middle">Sekretaris Desa</text>
  <text class="name" x="600" y="355" text-anchor="middle">Siti Rahmawati, S.E</text>

  <rect class="box-sub" x="810" y="300" width="250" height="78" rx="16"/>
  <text class="title" x="935" y="331" text-anchor="middle">LPM Desa</text>
  <text class="name" x="935" y="355" text-anchor="middle">Lembaga Pemberdayaan</text>

  <path class="line" d="M600 253 V276 M265 276 H935 M265 276 V300 M600 276 V300 M935 276 V300"/>

  <rect class="box" x="95" y="470" width="190" height="78" rx="16"/>
  <text class="title" x="190" y="501" text-anchor="middle">Kaur Umum</text>
  <text class="name" x="190" y="525" text-anchor="middle">Administrasi</text>

  <rect class="box" x="315" y="470" width="190" height="78" rx="16"/>
  <text class="title" x="410" y="501" text-anchor="middle">Kaur Keuangan</text>
  <text class="name" x="410" y="525" text-anchor="middle">Bendahara Desa</text>

  <rect class="box" x="535" y="470" width="190" height="78" rx="16"/>
  <text class="title" x="630" y="501" text-anchor="middle">Kasi Pemerintahan</text>
  <text class="name" x="630" y="525" text-anchor="middle">Pelayanan Warga</text>

  <rect class="box" x="755" y="470" width="190" height="78" rx="16"/>
  <text class="title" x="850" y="501" text-anchor="middle">Kasi Kesejahteraan</text>
  <text class="name" x="850" y="525" text-anchor="middle">Program Sosial</text>

  <rect class="box" x="975" y="470" width="190" height="78" rx="16"/>
  <text class="title" x="1070" y="501" text-anchor="middle">Kasi Pelayanan</text>
  <text class="name" x="1070" y="525" text-anchor="middle">Layanan Publik</text>

  <path class="line" d="M600 378 V430 M190 430 H1070 M190 430 V470 M410 430 V470 M630 430 V470 M850 430 V470 M1070 430 V470"/>

  <rect class="box-sub" x="150" y="610" width="210" height="58" rx="15"/>
  <text class="title" x="255" y="646" text-anchor="middle">Kepala Dusun I</text>

  <rect class="box-sub" x="495" y="610" width="210" height="58" rx="15"/>
  <text class="title" x="600" y="646" text-anchor="middle">Kepala Dusun II</text>

  <rect class="box-sub" x="840" y="610" width="210" height="58" rx="15"/>
  <text class="title" x="945" y="646" text-anchor="middle">Kepala Dusun III</text>

  <path class="line" d="M630 548 V580 M255 580 H945 M255 580 V610 M600 580 V610 M945 580 V610"/>
</svg>
